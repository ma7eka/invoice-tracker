<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的雲端發票管家</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding-top: 50px; }
    .container { max-width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: #0d6efd; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🧾 雲端發票自動追蹤系統</h2>
  <div class="row mb-4">
    <div class="col-6">
      <div class="card bg-primary text-white text-center p-3">
        <h5>發票總數</h5>
        <h2 id="stat-count">0</h2>
      </div>
    </div>
    <div class="col-6">
      <div class="card bg-success text-white text-center p-3">
        <h5>累計總金額</h5>
        <h2 id="stat-amount">$0</h2>
      </div>
    </div>
  </div>
  <p class="text-muted">目前的發票清單（每 10 秒自動更新）</p>

  <table class="table table-hover">
    <thead class="table-primary">
    <tr>
      <th>ID</th>
      <th>發票號碼</th>
      <th>消費店家</th>
      <th>金額</th>
    </tr>
    </thead>
    <tbody id="invoice-list">
    </tbody>
  </table>
</div>

<script>
  // 抓取發票清單 API
  function refreshInvoices() {
    fetch('/show-all')
            .then(response => response.json())
            .then(data => {
              const list = document.getElementById('invoice-list');
              list.innerHTML = '';
              // 只顯示最近的 10 筆，不然畫面會太長
              data.reverse().slice(0, 10).forEach(inv => {
                list.innerHTML += `
                        <tr>
                            <td>${inv.id}</td>
                            <td><span class="badge bg-secondary">${inv.invNum}</span></td>
                            <td>${inv.sellerName}</td>
                            <td class="fw-bold text-success">$${inv.amount}</td>
                        </tr>
                    `;
              });
            });
  }

  // 抓取統計數據 API
  function refreshStats() {
    fetch('/stats')
            .then(res => res.json())
            .then(data => {
              // 把數字填入對應的 ID 卡片中
              document.getElementById('stat-count').innerText = data.totalCount;
              document.getElementById('stat-amount').innerText = '$' + data.totalAmount.toLocaleString(); // 加入千分位符號比較好看
            })
            .catch(err => console.error("統計資料抓取失敗:", err));
  }

  // 每 2 秒同步一次 (頻率可以自己調)
  setInterval(() => {
    refreshInvoices();
    refreshStats();
  }, 2000);

  // 網頁開啟時立刻執行
  refreshInvoices();
  refreshStats();
</script>

</body>
</html>
