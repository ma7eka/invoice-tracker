<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的雲端發票管家</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    body {
      background-color: #f0f2f5;
      font-family: 'Inter', -apple-system, sans-serif;
      padding-top: 50px;
    }

    .container {
      max-width: 900px;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    /* 閃爍綠燈特效 */
    .status-pulse {
      width: 10px;
      height: 10px;
      background: #2ecc71;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 0 rgba(46, 204, 113, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
    }

    .card-count {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      transition: transform 0.3s;
    }

    .card-amount {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      border: none;
      transition: transform 0.3s;
    }

    .card:hover { transform: translateY(-5px); }

    h2.stat-number {
      font-weight: 700;
      font-size: 2.8rem;
      letter-spacing: -1px;
    }

    .badge-invoice {
      background-color: #e9ecef;
      color: #495057;
      font-family: 'Courier New', monospace;
    }

    /* 每一列進場的淡入動畫 */
    .fade-in-row {
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🧾 雲端發票自動追蹤系統</h2>
    <span class="badge bg-dark rounded-pill px-3 py-2">
            <span class="status-pulse"></span>系統實時運作中
        </span>
  </div>

  <div class="row mb-4">
    <div class="col-6">
      <div class="card card-count text-white text-center p-4">
        <h6 class="text-uppercase opacity-75">發票總數</h6>
        <h2 id="stat-count" class="stat-number">0</h2>
      </div>
    </div>
    <div class="col-6">
      <div class="card card-amount text-white text-center p-4">
        <h6 class="text-uppercase opacity-75">累計總金額</h6>
        <h2 id="stat-amount" class="stat-number">$0</h2>
      </div>
    </div>
  </div>

  <p class="text-muted">最新的 10 筆消費紀錄（每 10 秒自動產生）</p>

  <table class="table table-hover">
    <thead class="table-light">
    <tr>
      <th>ID</th>
      <th>發票號碼</th>
      <th>消費店家</th>
      <th>金額</th>
    </tr>
    </thead>
    <tbody id="invoice-list"></tbody>
  </table>
</div>

<script>
  // 數字滾動動畫函數
  function animateNumber(id, target) {
    const el = document.getElementById(id);
    const currentText = el.innerText.replace(/[$,]/g, '');
    const current = parseInt(currentText) || 0;
    if (current === target) return;

    const step = (target - current) / 10;
    let count = current;

    const timer = setInterval(() => {
      count += step;
      if ((step > 0 && count >= target) || (step < 0 && count <= target)) {
        el.innerText = (id === 'stat-amount' ? '$' : '') + target.toLocaleString();
        clearInterval(timer);
      } else {
        el.innerText = (id === 'stat-amount' ? '$' : '') + Math.floor(count).toLocaleString();
      }
    }, 30);
  }

  function refreshInvoices() {
    fetch('/show-all')
            .then(res => res.json())
            .then(data => {
              const list = document.getElementById('invoice-list');
              list.innerHTML = '';
              if(data && data.length > 0) {
                data.reverse().slice(0, 10).forEach(inv => {
                  list.innerHTML += `
                            <tr class="fade-in-row">
                                <td class="text-muted">#${inv.id}</td>
                                <td><span class="badge badge-invoice">${inv.invNum}</span></td>
                                <td class="fw-bold">${inv.sellerName}</td>
                                <td class="fw-bold text-success">$${inv.amount}</td>
                            </tr>
                        `;
                });
              }
            });
  }

  function refreshStats() {
    fetch('/stats')
            .then(res => res.json())
            .then(data => {
              animateNumber('stat-count', data.totalCount);
              animateNumber('stat-amount', data.totalAmount);
            });
  }

  setInterval(() => {
    refreshInvoices();
    refreshStats();
  }, 2000);

  refreshInvoices();
  refreshStats();
</script>
</body>
</html>
