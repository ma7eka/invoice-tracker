<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的雲端發票管家</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; padding-top: 50px; }
    .container { max-width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: #0d6efd; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🧾 雲端發票自動追蹤系統</h2>
  <p class="text-muted">目前的發票清單（每 10 秒自動更新）</p>

  <table class="table table-hover">
    <thead class="table-primary">
    <tr>
      <th>ID</th>
      <th>發票號碼</th>
      <th>消費店家</th>
      <th>金額</th>
    </tr>
    </thead>
    <tbody id="invoice-list">
    </tbody>
  </table>
</div>

<script>
  // 寫一小段 JavaScript 去抓你剛才做好的 API
  function refreshInvoices() {
    fetch('/show-all')
            .then(response => response.json())
            .then(data => {
              const list = document.getElementById('invoice-list');
              list.innerHTML = ''; // 先清空舊的
              data.forEach(inv => {
                list.innerHTML += `
                        <tr>
                            <td>${inv.id}</td>
                            <td><span class="badge bg-secondary">${inv.invNum}</span></td>
                            <td>${inv.sellerName}</td>
                            <td class="fw-bold text-success">$${inv.amount}</td>
                        </tr>
                    `;
              });
            });
  }

  // 每一秒鐘更新一次畫面，讓你看起來像在監控即時資料
  setInterval(refreshInvoices, 1000);
  refreshInvoices(); // 網頁打開立刻執行一次
</script>

</body>
</html>
