<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的雲端發票管家</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* 引入 Google 字體 */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    body {
      background-color: #f0f2f5;
      font-family: 'Inter', -apple-system, sans-serif;
      padding-top: 50px;
    }

    .container {
      max-width: 900px;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    /* 自定義統計卡片顏色 */
    .card-count {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* 質感的紫色調 */
      border: none;
      transition: transform 0.3s;
    }

    .card-amount {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); /* 活力的綠色調 */
      border: none;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px); /* 滑鼠移上去會輕微浮起 */
    }

    h2.stat-number {
      font-weight: 700;
      font-size: 2.5rem;
      letter-spacing: -1px;
    }

    .table thead {
      background-color: #f8f9fa;
      border-bottom: 2px solid #dee2e6;
    }

    .badge-invoice {
      background-color: #e9ecef;
      color: #495057;
      font-family: 'Courier New', monospace; /* 發票號碼用等寬字體更有 Feel */
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🧾 雲端發票自動追蹤系統</h2>
  <div class="row mb-4">
    <div class="col-6">
      <div class="card card-count text-white text-center p-4">
        <h6 class="text-uppercase opacity-75">發票總數</h6>
        <h2 id="stat-count" class="stat-number">0</h2>
      </div>
    </div>
    <div class="col-6">
      <div class="card card-amount text-white text-center p-4">
        <h6 class="text-uppercase opacity-75">累計總金額</h6>
        <h2 id="stat-amount" class="stat-number">$0</h2>
      </div>
    </div>
  </div>
  <p class="text-muted">目前的發票清單（每 10 秒自動更新）</p>

  <table class="table table-hover">
    <thead class="table-primary">
    <tr>
      <th>ID</th>
      <th>發票號碼</th>
      <th>消費店家</th>
      <th>金額</th>
    </tr>
    </thead>
    <tbody id="invoice-list">
    </tbody>
  </table>
</div>

<script>
  // 抓取發票清單 API
  function refreshInvoices() {
    fetch('/show-all')
            .then(response => response.json())
            .then(data => {
              const list = document.getElementById('invoice-list');
              list.innerHTML = '';

              // 確保有資料才執行
              if(data && data.length > 0) {
                // .reverse() 讓最新的排在上面，.slice(0, 10) 只取前十筆
                data.reverse().slice(0, 10).forEach(inv => {
                  list.innerHTML += `
                        <tr>
                            <td class="text-muted">#${inv.id}</td>
                            <td><span class="badge badge-invoice">${inv.invNum}</span></td>
                            <td class="fw-bold">${inv.sellerName}</td>
                            <td class="fw-bold text-success" style="font-size: 1.1rem;">$${inv.amount}</td>
                        </tr>
                    `;
                });
              }
            })
            .catch(err => console.error("抓取清單失敗:", err));
  }

  // 抓取統計數據 API
  function refreshStats() {
    fetch('/stats')
            .then(res => res.json())
            .then(data => {
              // 把數字填入對應的 ID 卡片中
              document.getElementById('stat-count').innerText = data.totalCount;
              document.getElementById('stat-amount').innerText = '$' + data.totalAmount.toLocaleString();
            })
            .catch(err => console.error("統計資料抓取失敗:", err));
  }

  // 每 2 秒同步一次
  setInterval(() => {
    refreshInvoices();
    refreshStats();
  }, 2000);

  // 網頁開啟時立刻啟動一次
  refreshInvoices();
  refreshStats();
</script>

</body>
</html>
